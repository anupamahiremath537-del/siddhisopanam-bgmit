[build]
  publish = "public"
  command = "echo 'No build step'"

[build.environment]
  NODE_VERSION = "20"

# Redirect API requests to your backend. Replace the URL below with your actual backend base URL once deployed.
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL.com/api/:splat"
  status = 200
  force = true

# Client-side route rewrites for static HTML pages.
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
  force = true

[[redirects]]
  from = "/choice/*"
  to = "/choice.html"
  status = 200
  force = false

[[redirects]]
  from = "/signup/*"
  to = "/signup.html"
  status = 200
  force = false

[[redirects]]
  from = "/user-login"
  to = "/user-login.html"
  status = 200
  force = false

[[redirects]]
  from = "/user-signup"
  to = "/user-signup.html"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
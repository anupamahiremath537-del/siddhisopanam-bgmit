<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Safety Portal</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .alert-card { border: 1px solid #ccc; margin: 10px 0; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        .alert-card img { width: 200px; border-radius: 4px; }
        input, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            const result = await response.json();
            alert(result.message);
        }

        async function getAlerts() {
            const response = await fetch('/api/alerts');
            const data = await response.json();
            const container = document.getElementById('alerts-display');
            container.innerHTML = '';
            
            data.alerts.forEach(alert => {
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert-card';
                alertDiv.innerHTML = `
                    <h3>${alert.name} (Age: ${alert.age})</h3>
                    <img src="/images/${alert.image}" alt="${alert.name}">
                    <p><strong>Status:</strong> ${alert.status}</p>
                    <p><strong>Description:</strong> ${alert.description}</p>
                    <p><strong>Last Seen:</strong> ${alert.last_seen}</p>
                `;
                container.appendChild(alertDiv);
            });
        }

        async function submitReport() {
            const location = document.getElementById('report-location').value;
            const details = document.getElementById('report-details').value;
            const response = await fetch('/api/report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ location, details })
            });
            const result = await response.json();
            alert(result.message);
        }

        async function getStats() {
            const response = await fetch('/api/stats');
            const data = await response.json();
            const container = document.getElementById('stats-display');
            let html = `<h3>Total Participants: ${data.total}</h3><ul>`;
            data.details.forEach(item => {
                html += `<li><strong>${item.file}:</strong> ${item.count}</li>`;
            });
            html += '</ul>';
            container.innerHTML = html;
        }

        async function emergencyCall() {
            const response = await fetch('/api/emergency', { method: 'POST' });
            const result = await response.json();
            alert(result.message);
        }
    </script>
</head>
<body>
    <h1>Child Safety Portal</h1>

    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <button onclick="login()">Login</button>

    <h2>Active Alerts</h2>
    <button onclick="getAlerts()">Fetch Missing Child Alerts</button>
    <div id="alerts-display"></div>

    <h2>Submit Sighting Report</h2>
    <input type="text" id="report-location" placeholder="Where did you see them?">
    <textarea id="report-details" placeholder="Any specific details?"></textarea>
    <button onclick="submitReport()">Submit Report</button>

    <h2>Emergency Contact</h2>
    <button onclick="emergencyCall()">Call Emergency Hotline</button>

    <hr>
    <h2>Event Statistics</h2>
    <button onclick="getStats()">Show Participant Counts</button>
    <div id="stats-display"></div>
</body>
</html>
